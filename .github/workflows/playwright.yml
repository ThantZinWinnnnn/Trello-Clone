name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Unit tests (no DB needed, always runs) ──────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  # ── Check secrets (workaround for job if condition limitation) ───────────
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-db-url: ${{ steps.check.outputs.defined }}
    steps:
      - id: check
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DB_URL" ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  # ── E2e tests (only runs when DB secrets are configured) ─────────────────
  e2e:
    name: E2E Tests
    needs: check-secrets
    if: needs.check-secrets.outputs.has-db-url == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          E2E_AUTH_COOKIE: ${{ secrets.E2E_AUTH_COOKIE }}
          PW_SKIP_WEBSERVER: "false"
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
